<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title> hedgecat0301 Telegram 요약 </title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/main.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin:0; padding:20px; background:#f9f9f9; }
        header { text-align:center; margin-bottom:20px; }
        #calendar { max-width:800px; margin:0 auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,.1); }
        #summary { margin-top:20px; padding:15px; background:#fff; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,.1); min-height:80px; }
        .loading { text-align:center; color:#666; font-style:italic; }
        .error { color:#c00; }
    </style>
</head>
<body>
<header>
    <h1>hedgecat0301 Telegram 채널 요약</h1>
    <p>날짜를 클릭하면 해당 날짜의 시장 요약을 보여줍니다.</p>
</header>

<div id="calendar"></div>
<div id="summary" class="loading">날짜를 선택해 주세요.</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script src="script.js"></script>
</body>
</html>
